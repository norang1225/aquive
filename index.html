<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AQUIVE — Grand Ocean Tank</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Oxanium:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#042840}
body{font-family:'Raleway',sans-serif;user-select:none}

#wrap{width:100vw;height:100vh;position:relative;overflow:hidden}

/* ── 배경 레이어 ── */
/* 이미지 자체에 패럴랙스 여유분 포함 (4880px 기준) */
#layer-bg-base {
  position:absolute;
  top:0;
  left:-120px;
  width:calc(100% + 240px);
  height:100%;
  vertical-align:top;
  z-index:1;
  display:none;
}

/* volume/caustic: 효과 레이어라 height:auto (비율 유지), top으로 위치 이동 */
#layer-bg-caustic,
#layer-bg-volume {
  position:absolute;
  top:0;
  left:-120px;
  width:calc(100% + 240px);
  height:auto;
  vertical-align:top;
  display:none;
}
#layer-bg-caustic{
  z-index:3;mix-blend-mode:screen;pointer-events:none;
  animation:caustic-sway 4s ease-in-out infinite;
}
#layer-bg-volume {z-index:2;mix-blend-mode:screen;pointer-events:none;opacity:0.7}

/* mid-obj: 오브젝트 레이어라 height:auto (비율 유지), bottom:0 기준 배치 */
#layer-mid-obj {
  position:absolute;
  bottom:0;
  left:-120px;
  width:calc(100% + 240px);
  height:auto;
  vertical-align:top;
  z-index:8;
  pointer-events:none;
  display:none;
}

/* ── 바닥 레이어 (이미지 자체에 여유분 포함) ── */
#layer-floor-base,
#layer-floor-obj {
  position:absolute;
  bottom:0;
  left:-120px;
  width:calc(100% + 240px);
  height:auto;
  display:none;
  pointer-events:none;
  vertical-align:top;
}
#layer-floor-base { z-index:25; }
#layer-floor-obj  { z-index:28; }

/* 대수조: base만 세로로 늘어남 (JS recalcGrandWorld()가 px로 설정)
   volume/caustic/mid-obj는 화면 높이 유지 — 스크롤 시 반복 표시되는 효과용 */
.grand-mode #layer-bg-base {
  height:300%;  /* fallback, JS 로드 후 px로 덮어씌워짐 */
}

@keyframes caustic-sway{
  0%  { transform:scaleX(0.94) scaleY(0.97); opacity:0.7; }
  50% { transform:scaleX(1.06) scaleY(1.03); opacity:1.0; }
  100%{ transform:scaleX(0.94) scaleY(0.97); opacity:0.7; }
}

/* ── 수면 반사 shimmer 이미지 레이어 ── */
#layer-shimmer-img{
  position:absolute;
  top:0; left:-120px;
  width:calc(100% + 240px);
  height:100%;
  z-index:50;pointer-events:none;
  object-fit:cover;
  display:none;
  animation:shimmer-breathe 5s ease-in-out infinite alternate;
}
@keyframes shimmer-breathe{
  from{ opacity:0.3; }
  to  { opacity:0.7; }
}

/* ── 프레임 이미지 레이어 ── */
#layer-frame-img{
  position:absolute;
  top:0; left:-80px;
  width:calc(100% + 160px);
  height:auto;
  z-index:55;pointer-events:none;
  display:none;
}
/* ── 기본 그라디언트 배경 (PNG 없을 때) ── */
#default-bg{
  position:absolute;inset:0;z-index:0;
  background:linear-gradient(180deg,
    #2ab8f0 0%,#18a0e0 10%,#1080c8 28%,
    #0c60a0 55%,#084878 80%,#042840 100%
  );
}
/* 기본 수광 */
#default-caustic{
  position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 55% at 50% -5%,rgba(200,245,255,0.3) 0%,transparent 100%);
  pointer-events:none;
}

/* ── 캔버스 ── */
#cvs-far{position:absolute;inset:0;z-index:10}
#cvs-mid{position:absolute;inset:0;z-index:20}
#cvs-fg {position:absolute;inset:0;z-index:30}

/* ── 수면 ── */
#surface-overlay{
  position:absolute;top:0;left:0;right:0;height:22%;
  z-index:35;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(160,235,255,0.2) 0%,transparent 100%);
}

/* ── 기포 ── */
#bubbles1{position:absolute;inset:0;z-index:9;pointer-events:none;overflow:hidden}
#bubbles2{position:absolute;inset:0;z-index:38;pointer-events:none;overflow:hidden}
.bub1,.bub2{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.2) 0%,rgba(200,240,255,0.06) 55%,transparent 100%);
}

/* ── 수류 캔버스 ── */

/* ── 팝업 ── */
#popup{
  position:fixed;z-index:200;
  background:rgba(0,15,45,0.9);
  border:1px solid rgba(120,210,255,0.2);
  border-radius:12px;padding:18px 22px;max-width:250px;
  color:#c0e8ff;pointer-events:none;
  opacity:0;transform:translateY(8px);
  transition:opacity .25s,transform .25s;
  backdrop-filter:blur(14px);
  box-shadow:0 8px 40px rgba(0,50,140,0.35);
}
#popup.on{opacity:1;transform:translateY(0)}
#popup h3{font-family:'Cinzel',serif;font-size:14px;color:#e8f8ff;margin-bottom:3px;letter-spacing:.07em}
#popup .lat{font-size:11px;color:rgba(150,215,255,0.5);font-style:italic;margin-bottom:10px}
#popup p{font-size:12px;color:rgba(180,230,255,0.75);line-height:1.65}
#popup .badge{display:inline-block;margin-top:10px;font-size:10px;padding:2px 10px;border:1px solid rgba(120,210,255,0.2);border-radius:20px;color:rgba(140,215,255,0.6)}

/* ── UI 라벨 ── */
#ui-tl{position:fixed;top:26px;left:34px;z-index:90;line-height:1;font-family:'Oxanium','Noto Sans KR',sans-serif}
#ui-tank-name{
  font-family:'Oxanium','Noto Sans KR',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;
  color:rgba(230,245,255,0.8);
  margin-bottom:9px;
  font-variant-numeric:tabular-nums;
  font-feature-settings:'tnum' 1;
  text-shadow:
    -0.5px -0.5px 2px rgba(255,255,255,0.5),
     0.5px  0.5px 2px rgba(0,10,35,0.85);
}
#ui-depth-wrap{display:flex;align-items:baseline;gap:4px}
#ui-depth{
  font-family:'Oxanium',sans-serif;font-size:32px;font-weight:700;
  letter-spacing:.02em;
  color:rgba(230,245,255,0.85);
  font-variant-numeric:tabular-nums;
  font-feature-settings:'tnum' 1;
  text-shadow:
    -0.5px -0.5px 2px rgba(255,255,255,0.5),
     0.5px  0.5px 2px rgba(0,10,35,0.85);
  transition:all 0.6s ease;
}
#ui-depth-unit{
  font-family:'Oxanium',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.06em;
  color:rgba(230,245,255,0.85);
  font-variant-numeric:tabular-nums;
  font-feature-settings:'tnum' 1;
  text-shadow:
    -0.5px -0.5px 2px rgba(255,255,255,0.5),
     0.5px  0.5px 2px rgba(0,10,35,0.85);
}
#ui-visit{
  font-family:'Oxanium','Noto Sans KR',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.12em;
  color:rgba(230,245,255,0.8);
  margin-top:7px;
  font-variant-numeric:tabular-nums;
  font-feature-settings:'tnum' 1;
  text-shadow:
    -0.5px -0.5px 2px rgba(255,255,255,0.5),
     0.5px  0.5px 2px rgba(0,10,35,0.85);
}
#ui-tr{position:fixed;top:132px;right:34px;z-index:90;font-size:10px;letter-spacing:.18em;color:rgba(160,220,255,0.28)}

/* ── 지도 토글 버튼 ── */
#map-toggle{
  position:fixed;top:24px;right:34px;z-index:91;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,20,55,0.55);
  border:1px solid rgba(120,210,255,0.25);
  color:rgba(190,230,255,0.75);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(10px);
  transition:all .2s;
}
#map-toggle:hover{
  background:rgba(0,45,110,0.7);
  border-color:rgba(150,220,255,0.55);
  color:rgba(225,245,255,0.95);
}
#map-toggle svg{width:18px;height:18px}
#map-toggle.hide-self{opacity:0;pointer-events:none}

/* ── 도감 토글 버튼 ── */
#dex-toggle{
  position:fixed;top:78px;right:34px;z-index:91;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,20,55,0.55);
  border:1px solid rgba(120,210,255,0.25);
  color:rgba(190,230,255,0.75);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(10px);
  transition:all .2s;
}
#dex-toggle:hover{
  background:rgba(0,45,110,0.7);
  border-color:rgba(150,220,255,0.55);
  color:rgba(225,245,255,0.95);
}
#dex-toggle svg{width:18px;height:18px}
#dex-badge{
  position:absolute;bottom:-3px;right:-3px;
  min-width:16px;height:16px;border-radius:8px;padding:0 4px;
  background:rgba(255,205,110,0.95);
  color:rgba(40,25,5,0.95);
  font-family:'Oxanium',sans-serif;font-size:8.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
}

/* ── 대수조 세로 스크롤바 ── */
#grand-scrollbar{
  position:fixed;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  width:4px;
  height:min(360px, 55vh);
  z-index:91;
  display:none;  /* onTankChanged에서 JS로 토글 */
}

#grand-scroll-track{
  position:absolute;inset:0;
  background:rgba(150,210,255,0.1);
  border-radius:2px;
  border:1px solid rgba(120,190,255,0.15);
}
#grand-scroll-handle{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:12px;
  border-radius:6px;
  background:rgba(160,220,255,0.55);
  border:1px solid rgba(200,240,255,0.4);
  cursor:grab;
  transition:background .15s, width .15s;
  /* 높이는 JS에서 계산 */
}
#grand-scroll-handle:hover,
#grand-scroll-handle.dragging{
  background:rgba(200,235,255,0.8);
  border-color:rgba(230,248,255,0.7);
  width:14px;
  cursor:grabbing;
}
/* 트랙 위아래 끝 표시 */
#grand-scroll-track::before,
#grand-scroll-track::after{
  content:'';
  position:absolute;
  left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;
  background:rgba(150,210,255,0.25);
}
#grand-scroll-track::before{ top:-4px; }
#grand-scroll-track::after { bottom:-4px; }

/* ── 대수조 가로 패럴랙스 슬라이더 ── */
#grand-plx-slider{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  width:min(240px, 30vw);
  height:4px;
  z-index:91;
  display:none;  /* 대수조에서만 JS로 표시 */
}
#grand-plx-track{
  position:absolute;inset:0;
  background:rgba(150,210,255,0.1);
  border-radius:2px;
  border:1px solid rgba(120,190,255,0.15);
}
#grand-plx-handle{
  position:absolute;
  top:50%;transform:translateY(-50%);
  left:50%;           /* 기본 중앙 */
  margin-left:-6px;   /* 핸들 폭/2 보정 */
  width:12px;height:12px;
  border-radius:50%;
  background:rgba(160,220,255,0.55);
  border:1px solid rgba(200,240,255,0.4);
  cursor:grab;
  transition:background .15s, width .15s, height .15s;
}
#grand-plx-handle:hover,
#grand-plx-handle.dragging{
  background:rgba(200,235,255,0.8);
  border-color:rgba(230,248,255,0.7);
  width:14px;height:14px;margin-left:-7px;
  cursor:grabbing;
}
/* 트랙 양끝 표시 */
#grand-plx-track::before,
#grand-plx-track::after{
  content:'';
  position:absolute;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;
  background:rgba(150,210,255,0.25);
}
#grand-plx-track::before{ left:-4px; }
#grand-plx-track::after { right:-4px; }
/* 방향 힌트 텍스트 */
#grand-plx-slider::before,
#grand-plx-slider::after{
  content:'◂';
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:8px;color:rgba(150,210,255,0.3);
  pointer-events:none;
}
#grand-plx-slider::before{ left:-14px; }
#grand-plx-slider::after { right:-14px; content:'▸'; }
#ui-bl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:90;font-size:10px;letter-spacing:.18em;color:rgba(150,215,255,0.22);white-space:nowrap}

/* ══════════════════════════════════════
   편집 패널
══════════════════════════════════════ */


/* ── 수조 네비게이션 ── */
#tank-nav{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:90;display:flex;align-items:center;gap:16px;
}
.nav-arrow{
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,20,60,0.5);
  border:1px solid rgba(100,200,255,0.2);
  color:rgba(180,230,255,0.6);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(8px);
}
.nav-arrow:hover{
  background:rgba(0,40,100,0.7);
  border-color:rgba(140,220,255,0.5);
  color:rgba(220,245,255,0.95);
}
.nav-arrow:disabled{
  opacity:0.2;cursor:default;pointer-events:none;
}
#tank-nav-info{
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
#tank-nav-name{
  font-family:'Oxanium','Noto Sans KR',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:.18em;
  color:rgba(230,245,255,0.8);
  text-shadow:-0.5px -0.5px 2px rgba(255,255,255,0.5),0.5px 0.5px 2px rgba(0,10,35,0.85);
  white-space:nowrap;
}
#tank-nav-dots{display:flex;gap:5px;align-items:center}
.nav-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(150,210,255,0.25);
  transition:all .3s;cursor:pointer;
}
.nav-dot.active{
  width:18px;border-radius:3px;
  background:rgba(180,230,255,0.7);
}
.nav-dot.locked{
  background:rgba(100,150,200,0.15);
  border:1px solid rgba(100,180,255,0.15);
}

/* ── 수조 전환 오버레이 ── */
#tank-overlay{
  position:fixed;inset:0;z-index:85;
  background:#000818;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s ease;
}
#tank-overlay.fade-in{opacity:1;pointer-events:all;}

/* ── 잠금 수조 토스트 ── */
#lock-toast{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:130;
  background:rgba(0,10,30,0.9);
  border:1px solid rgba(100,180,255,0.2);
  border-radius:10px;padding:16px 24px;
  text-align:center;
  backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;
  transition:opacity 0.25s;
}
#lock-toast.show{opacity:1}
#lock-toast .lock-icon{font-size:24px;margin-bottom:8px}
#lock-toast .lock-msg{
  font-family:'Oxanium','Noto Sans KR',sans-serif;
  font-size:12px;letter-spacing:.14em;
  color:rgba(180,225,255,0.7);line-height:1.7;
}

/* ══════════════════════════════════════
   건물 지도
══════════════════════════════════════ */
#map-overlay{
  position:fixed;inset:0;z-index:120;
  background:rgba(2,10,26,0.78);
  backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
  display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
}
#map-overlay.open{opacity:1;pointer-events:all}

#map-panel{
  position:relative;
  width:min(880px, 92vw);
  max-height:88vh;
  background:linear-gradient(165deg, rgba(6,26,52,0.97) 0%, rgba(3,16,36,0.99) 100%);
  border:1px solid rgba(120,200,255,0.22);
  border-radius:18px;
  box-shadow:0 30px 90px rgba(0,10,40,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
  padding:26px 30px 22px;
  transform:translateY(14px) scale(0.97);
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
  overflow:hidden;
}
#map-overlay.open #map-panel{transform:translateY(0) scale(1)}

@media (max-width:640px){
  #map-overlay{padding:14px}
  #map-panel{width:100%;max-height:94vh;padding:18px 14px 14px;border-radius:14px}
  #map-title{font-size:14px}
  #map-title .sub{font-size:8px;letter-spacing:.16em;margin-top:3px}
  #map-floor-tabs{margin:12px 0 10px}
  .floor-tab{padding:6px 13px;font-size:9px}
  #map-legend{font-size:9px;gap:12px;margin-top:10px}
  #map-stage{max-height:none}
}

#map-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:4px;
}
#map-title{
  font-family:'Cinzel',serif;font-size:17px;letter-spacing:.12em;
  color:rgba(230,245,255,0.92);
}
#map-title .sub{
  display:block;font-family:'Oxanium',sans-serif;font-size:9px;
  letter-spacing:.24em;color:rgba(140,200,255,0.45);margin-top:4px;
  text-transform:uppercase;
}
#map-close{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(120,200,255,0.18);
  color:rgba(180,220,255,0.6);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .2s;flex-shrink:0;
}
#map-close:hover{background:rgba(255,90,90,0.12);border-color:rgba(255,120,120,0.3);color:rgba(255,180,180,0.85)}

#map-floor-tabs{
  display:flex;gap:6px;margin:16px 0 14px;
}
.floor-tab{
  padding:7px 16px;border-radius:20px;
  font-family:'Oxanium',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.14em;color:rgba(160,210,255,0.45);
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(120,200,255,0.12);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.floor-tab:hover{color:rgba(200,230,255,0.7);border-color:rgba(140,210,255,0.3)}
.floor-tab.active{
  color:rgba(15,30,55,0.95);
  background:rgba(190,230,255,0.85);
  border-color:rgba(190,230,255,0.85);
}

#map-stage{
  position:relative;width:100%;
  aspect-ratio:880/640;
  max-height:62vh;
  border-radius:12px;
  overflow:hidden;
  background:radial-gradient(ellipse 90% 70% at 50% 10%, rgba(20,55,95,0.5) 0%, rgba(4,18,38,0.9) 70%);
  border:1px solid rgba(100,170,230,0.12);
}
#map-stage svg{width:100%;height:100%;display:block}

.map-room{cursor:pointer;transition:filter .2s}
.map-room:hover .room-fill{filter:brightness(1.25)}
.map-room:hover .room-label{fill:rgba(235,248,255,0.98)}
.map-room.current .room-fill{filter:brightness(1.1)}
.map-room.locked{cursor:default}
.map-room.locked:hover .room-fill{filter:none}

.room-fill{transition:filter .2s, opacity .2s}
.room-label{
  font-family:'Oxanium','Noto Sans KR',sans-serif;
  pointer-events:none;user-select:none;
}
.room-pulse{
  pointer-events:none;
  animation:room-pulse-anim 2.2s ease-in-out infinite;
}
@keyframes room-pulse-anim{
  0%,100%{opacity:.9;stroke-width:2}
  50%{opacity:.25;stroke-width:5}
}

#map-legend{

<script>
// ══════════════════════════════════════════
//  티어 배율
// ══════════════════════════════════════════
const TIER_SCALE = {xl:4.0, lg:2.2, sl:1.5, md:0.58, sm:0.32};

// ══════════════════════════════════════════
//  캔버스
// ══════════════════════════════════════════
const farCvs = document.getElementById('cvs-far');
const midCvs = document.getElementById('cvs-mid');
const fgCvs  = document.getElementById('cvs-fg');
const farCtx = farCvs.getContext('2d');
const midCtx = midCvs.getContext('2d');
const fgCtx  = fgCvs.getContext('2d');

// ── Retina(HiDPI) 대응 ──
// 캔버스 물리 픽셀 = 논리 픽셀 × dpr
// ctx는 dpr배로 스케일해서 논리 픽셀 좌표로 그리면 됨
const DPR = window.devicePixelRatio || 1;

function resize(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  [farCvs, midCvs, fgCvs].forEach(c => {
    c.width  = Math.round(vw * DPR);
    c.height = Math.round(vh * DPR);
    c.style.width  = vw + 'px';
    c.style.height = vh + 'px';
  });
  // ctx 스케일 초기화 후 dpr 적용
  [farCtx, midCtx, fgCtx].forEach(ctx => {
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  });
}
resize();
window.addEventListener('resize',()=>{resize();rebuildFish();});

// ══════════════════════════════════════════
//  물고기 인스턴스
// ══════════════════════════════════════════
let FISH = [];   // 런타임 인스턴스
let fishData = [];

function buildInstance(fd){
  // fd: {id, name, latin, desc, dep, tier, layer, count, speed, src}
  const vw = logicalW();
  const vh = logicalH();
  const tierScl = TIER_SCALE[fd.tier]||1;
  let depthScl, yMin, yMax, da;
  switch(fd.layer){
    case 'far':  depthScl=0.52; yMin=vh*.05; yMax=vh*.52; da=0.48; break;
    case 'bot':  depthScl=0.82; yMin=vh*.78; yMax=vh*.91; da=0.82; break;
    case 'near': depthScl=1.12; yMin=vh*.08; yMax=vh*.88; da=1.0;  break;
    default:     depthScl=0.9;  yMin=vh*.12; yMax=vh*.78; da=0.78;
  }
  // 기준 크기: 이미지 원본 비율 유지, 너비 200px 기준
  const baseW = 200;
  const baseH = fd.imgH && fd.imgW ? baseW * (fd.imgH/fd.imgW) : 80;
  const w = baseW * tierScl * depthScl;
  const h = baseH * tierScl * depthScl;

  const img = new Image();
  img.src = fd.src;

  const instances = [];
  for(let i=0;i<fd.count;i++){
    instances.push({
      fd, img, w, h, da,
      x: Math.random()*(vw+w*2)-w,
      y: yMin+Math.random()*(yMax-yMin),
      yMin, yMax,
      dir: Math.random()>.5?1:-1,
      t: Math.random()*300,
      phase: Math.random()*Math.PI*2,
      sm: 0.82+Math.random()*.36,
    });
  }
  return instances;
}


// ══════════════════════════════════════════
//  수심 시스템
//  - 방문마다 -10m, 최대 -4000m
//  - localStorage 기반 (로그인 연동 전 임시)
// ══════════════════════════════════════════
const DEPTH_PER_VISIT = 10;
const MAX_DEPTH = 4000;

function getDepthData() {
  try {
    return JSON.parse(localStorage.getItem('aquive_depth') || '{"visits":0,"depth":0}');
  } catch(e) { return {visits:0, depth:0}; }
}
function saveDepthData(obj) {
  try { localStorage.setItem('aquive_depth', JSON.stringify(obj)); } catch(e) {}
}

function recordVisit() {
  const data = getDepthData();
  // 같은 세션 중복 카운트 방지
  const lastVisit = localStorage.getItem('aquive_last_session');
  const sessionKey = Math.floor(Date.now() / (1000 * 60 * 30)).toString(); // 30분 단위 세션
  if(lastVisit !== sessionKey) {
    data.visits = Math.min(data.visits + 1, MAX_DEPTH / DEPTH_PER_VISIT);
    data.depth  = data.visits * DEPTH_PER_VISIT;
    saveDepthData(data);
    localStorage.setItem('aquive_last_session', sessionKey);
  }
  return data;
}

function renderDepth() {
  const data = getDepthData();
  const depthEl = document.getElementById('ui-depth');
  const visitEl = document.getElementById('ui-visit');
  if(!depthEl) return;

  // 숫자 카운트업 애니메이션
  const target = -data.depth;
  let current = 0;
  const step = target / 40;
  let frame = 0;
  function countUp() {
    frame++;
    current += step;
    if(frame >= 40) {
      depthEl.textContent = target.toLocaleString();
    } else {
      depthEl.textContent = Math.round(current).toLocaleString();
      requestAnimationFrame(countUp);
    }
  }
  if(data.depth === 0) {
    depthEl.textContent = '0';
  } else {
    requestAnimationFrame(countUp);
  }

  // 방문 횟수 표시
  const remaining = MAX_DEPTH / DEPTH_PER_VISIT - data.visits;
  if(visitEl) {
    if(data.depth >= MAX_DEPTH) {
      visitEl.textContent = '최대 수심 도달 · ―4,000m';
    } else {
      visitEl.textContent = `${data.visits}회 방문 · 다음 방문까지 ―${DEPTH_PER_VISIT}m`;
    }
  }
}

// 방문 기록 + 렌더
recordVisit();
renderDepth();

function rebuildFish(){
  FISH = [];
  fishData.forEach(fd=>{
    FISH.push(...buildInstance(fd));
  });
  const layerOrder={far:0,bot:1,mid:2,near:3};
  FISH.sort((a,b)=>(layerOrder[a.fd.layer]||2)-(layerOrder[b.fd.layer]||2));
  document.getElementById('ui-tr').textContent = FISH.length + ' specimens';
}
rebuildFish();

// ══════════════════════════════════════════
//  팝업
// ══════════════════════════════════════════
const popup = document.getElementById('popup');
let popT;
function showPopup(fd,mx,my){
  document.getElementById('p-name').textContent = fd.name;
  document.getElementById('p-lat').textContent  = fd.latin;
  document.getElementById('p-desc').textContent = fd.desc;
  document.getElementById('p-dep').textContent  = fd.dep;
  const pw=252,ph=172;
  let px=mx+18, py=my-ph/2;
  if(px+pw>window.innerWidth-10) px=mx-pw-18;
  if(py<10) py=10;
  if(py+ph>window.innerHeight-10) py=window.innerHeight-ph-10;
  popup.style.left=px+'px'; popup.style.top=py+'px';
  popup.classList.add('on');
  clearTimeout(popT);
  popT=setTimeout(()=>popup.classList.remove('on'),5500);
  recordSighting(fd.id);
}

[farCvs,midCvs,fgCvs].forEach(cvs=>{
  cvs.addEventListener('click',e=>{
    const mx=e.clientX,my=e.clientY;
    // 가장 위(near)부터 역순으로 체크
    for(let i=FISH.length-1;i>=0;i--){
      const f=FISH[i];
      // 실제 렌더 좌표 — dir 상관없이 x는 항상 왼쪽 끝
      const fx = f.x;
      const fy = f.y - f.h/2;
      // 히트 영역을 실제보다 20% 넉넉하게 (움직이는 물고기 클릭 편의)
      const pad = 0.1;
      const hx = fx - f.w * pad;
      const hy = fy - f.h * pad;
      const hw = f.w * (1 + pad * 2);
      const hh = f.h * (1 + pad * 2);
      if(mx>=hx && mx<=hx+hw && my>=hy && my<=hy+hh){
        showPopup(f.fd,mx,my); break;
      }
    }
  });
});


//  패럴랙스 + 대수조 세로 스크롤
// ══════════════════════════════════════════

// 현재 수조 인덱스 (패럴랙스/대수조 판별에 필요해서 여기서 선언)
let currentTankIdx = 0;

// 대수조 월드 높이 배율 (기본값: 이미지 로드 전 fallback)
const GRAND_WORLD_MULT_DEFAULT = 3;
let   grandWorldMult = GRAND_WORLD_MULT_DEFAULT;

// 이미지 실제 비율로 월드 높이 재계산
// base 이미지가 로드되면 호출됨
function recalcGrandWorld(){
  const img = document.getElementById('layer-bg-base');
  if(!img || !img.naturalWidth || !img.naturalHeight) return;

  const containerW = window.innerWidth + 160;
  const containerH = window.innerHeight;

  // base 이미지 전체가 보이도록 필요한 높이
  const neededH = containerW * (img.naturalHeight / img.naturalWidth);
  grandWorldMult = neededH / containerH;

  // base/frame 레이어 전체 높이로 설정
  img.style.height = neededH + 'px';
  const frameEl = document.getElementById('layer-frame-img');
  if(frameEl) frameEl.style.height = neededH + 'px';

  // 카메라를 맨 아래(바닥)로 정확히 맞춤
  if(isGrandTank()){
    const maxScroll = neededH - containerH;
    cam.target  = maxScroll;
    cam.current = maxScroll;
  }

  // 물고기 범위 재배치
  applyGrandFishRange();
}

// 패럴랙스 레이어별 배율 (마우스 중앙 편차 × 이 값 = 이동 픽셀)
const PLX = {
  base:     0.04,
  volume:   0.08,
  caustic:  0.12,
  midobj:   0.25,
  floor:    0.60,
  floorobj: 0.80,
  shimmer:  0.10,
  frame:    0.15,  // 액자: 화면 고정이지만 살짝 입체감
  fishFar:  0.35,
  fishMid:  0.55,
  fishNear: 0.85,
};

// 현재 패럴랙스 상태 (lerp target)
const plx = { mouseX: 0, mouseY: 0, curX: 0, curY: 0 };
// 대수조 세로 스크롤 카메라 오프셋
const cam = { target: 0, current: 0 };

// 마우스 추적 — X 패럴랙스 (모든 수조, 슬라이더 드래그 중에는 덮어쓰지 않음)
window.addEventListener('mousemove', e => {
  if(window._plxDragging) return;  // 드래그 중에는 마우스 위치 무시
  plx.mouseX = (e.clientX / window.innerWidth - 0.5);  // -0.5 ~ 0.5
});

// ── 대수조 스크롤바 드래그 ──
(function(){
  const bar    = document.getElementById('grand-scrollbar');
  const track  = document.getElementById('grand-scroll-track');
  const handle = document.getElementById('grand-scroll-handle');
  if(!bar || !track || !handle) return;

  let dragging = false;
  let dragStartY = 0;
  let dragStartCamTarget = 0;

  function trackH()  { return track.getBoundingClientRect().height; }
  function handleH() { return handle.getBoundingClientRect().height; }
  function scrollH() { return (grandWorldMult * window.innerHeight) - window.innerHeight; }

  // 핸들 크기: 트랙의 (1/grandWorldMult) 비율
  function updateHandleSize(){
    const th = trackH() || 360;
    handle.style.height = Math.round(th / grandWorldMult) + 'px';
  }

  // 카메라 위치 → 핸들 위치 동기화 (루프에서 매 프레임 호출)
  // 핸들 아래 = 바닥(시작), 핸들 위 = 수면(올라감)
  window.updateScrollHandle = function(){
    if(!isGrandTank()) return;
    updateHandleSize();
    const th = trackH();
    const hh = th / grandWorldMult;
    const travel = th - hh;
    const ratio  = scrollH() > 0 ? cam.current / scrollH() : 1;
    // ratio 반전: cam이 최대(바닥)=1 → 핸들 맨 아래, cam=0(수면) → 핸들 맨 위
    handle.style.top = Math.max(0, Math.min(travel, ratio * travel)) + 'px';
  };

  // 트랙 클릭 → 해당 위치로 즉시 이동
  track.addEventListener('mousedown', e => {
    if(e.target === handle) return;
    const rect  = track.getBoundingClientRect();
    const th    = rect.height;
    const hh    = th / grandWorldMult;
    const ratio = Math.max(0, Math.min(1, (e.clientY - rect.top - hh/2) / (th - hh)));
    cam.target  = ratio * scrollH();
    e.preventDefault();
  });

  // 핸들 드래그 시작
  handle.addEventListener('mousedown', e => {
    dragging = true;
    dragStartY = e.clientY;
    dragStartCamTarget = cam.target;
    handle.classList.add('dragging');
    e.preventDefault();
    e.stopPropagation();
  });

  // 드래그 중
  window.addEventListener('mousemove', e => {
    if(!dragging) return;
    const th     = trackH();
    const hh     = th / grandWorldMult;
    const travel = th - hh;
    const dy     = e.clientY - dragStartY;
    const ratio  = travel > 0 ? dy / travel : 0;
    cam.target   = Math.max(0, Math.min(scrollH(), dragStartCamTarget + ratio * scrollH()));
  });

  // 드래그 종료
  window.addEventListener('mouseup', () => {
    if(!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
  });

  // 휠 스크롤도 지원
  document.getElementById('wrap')?.addEventListener('wheel', e => {
    if(!isGrandTank()) return;
    cam.target = Math.max(0, Math.min(scrollH(), cam.target + e.deltaY * 0.8));
    e.preventDefault();
  }, { passive: false });
})();

// ── 대수조 가로 패럴랙스 슬라이더 ──
(function(){
  const slider = document.getElementById('grand-plx-slider');
  const track  = document.getElementById('grand-plx-track');
  const handle = document.getElementById('grand-plx-handle');
  if(!slider || !track || !handle) return;

  let dragging = false;
  let dragStartX = 0;
  let dragStartPlxX = 0;  // 드래그 시작 시점의 plx.mouseX

  function trackW() { return track.getBoundingClientRect().width; }

  // plx.mouseX(-0.5~0.5) → 핸들 위치 동기화 (모든 수조)
  window.updatePlxHandle = function(){
    const tw = trackW();
    const hw = 12;
    const travel = tw - hw;
    const px = ((plx.curX + 0.5) * travel);
    handle.style.left = Math.max(0, Math.min(travel, px)) + 'px';
    handle.style.marginLeft = '0';
  };

  // 트랙 클릭 → 해당 위치로 이동
  track.addEventListener('mousedown', e => {
    if(e.target === handle) return;
    const rect = track.getBoundingClientRect();
    const tw = rect.width;
    const hw = 12;
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left - hw/2) / (tw - hw)));
    plx.mouseX = ratio - 0.5;  // 0~1 → -0.5~0.5
    e.preventDefault();
  });

  // 핸들 드래그
  handle.addEventListener('mousedown', e => {
    dragging = true;
    window._plxDragging = true;
    dragStartX = e.clientX;
    dragStartPlxX = plx.mouseX;
    handle.classList.add('dragging');
    e.preventDefault();
    e.stopPropagation();
  });

  window.addEventListener('mousemove', e => {
    if(!dragging) return;
    const tw = trackW();
    const hw = 12;
    const travel = tw - hw;
    const dx = e.clientX - dragStartX;
    const ratio = travel > 0 ? dx / travel : 0;
    plx.mouseX = Math.max(-0.5, Math.min(0.5, dragStartPlxX + ratio));
  });

  window.addEventListener('mouseup', () => {
    if(!dragging) return;
    dragging = false;
    window._plxDragging = false;
    handle.classList.remove('dragging');
  });
})();

// 패럴랙스 배경 레이어 업데이트 (CSS transform)
const PLX_BG_MAP = [
  { id: 'layer-bg-base',    key: 'base',     baseLeft: -120 },
  { id: 'layer-bg-volume',  key: 'volume',   baseLeft: -120 },
  { id: 'layer-bg-caustic', key: 'caustic',  baseLeft: -120 },
  { id: 'layer-mid-obj',    key: 'midobj',   baseLeft: -120 },
  { id: 'layer-floor-base', key: 'floor',    baseLeft: -120 },
  { id: 'layer-floor-obj',  key: 'floorobj', baseLeft: -120 },
  { id: 'layer-shimmer-img',key: 'shimmer',  baseLeft: -120 },
  // frame은 화면 딱 맞는 크기라 패럴랙스 제외 (고정)
];
const PLX_BG_MAX_X = 60;   // X 최대 이동 픽셀 (여유분 120px 안에서 ±60px)
const PLX_BG_MAX_Y = 60;   // Y 최대 이동 픽셀 (대수조 세로 스크롤과 별개로 미세 패럴랙스)

function updateParallaxBg(isGrand){
  const dx = plx.curX * PLX_BG_MAX_X;

  PLX_BG_MAP.forEach(({ id, key, baseLeft }) => {
    const el = document.getElementById(id);
    if(!el || el.style.display === 'none') return;
    const scl  = PLX[key] || 0;
    const base = baseLeft ?? -120;

    // X: 패럴랙스 오프셋 (CSS left:-120px 기준에서 추가 이동)
    const offsetX = -dx * scl;

    if(key === 'caustic'){
      // caustic: @keyframes가 transform 사용
      // X → marginLeft, Y → marginTop 으로 우회 (transform 건드리지 않음)
      el.style.marginLeft = offsetX + 'px';
      el.style.marginTop  = isGrand ? (-cam.current + 'px') : '0px';

    } else if(key === 'floor' || key === 'floorobj' || key === 'midobj'){
      // 바닥/중경: X 패럴랙스 + 대수조에서 하단 기준 카메라 오프셋
      if(isGrand){
        const worldH  = window.innerHeight * grandWorldMult;
        const elH     = el.offsetHeight || 0;
        const offsetY = worldH - elH - cam.current;
        el.style.transform = `translateX(${offsetX}px) translateY(${offsetY}px)`;
        el.style.bottom    = 'auto';
        el.style.top       = '0px';
      } else {
        el.style.transform = `translateX(${offsetX}px)`;
        el.style.top       = 'auto';
        el.style.bottom    = '0px';
      }

    } else if(key === 'shimmer'){
      // shimmer: X만, top 고정
      el.style.transform = `translateX(${offsetX}px)`;

    } else {
      // base/volume 등: X + 대수조에서 카메라 오프셋
      const offsetY = isGrand ? -cam.current : 0;
      el.style.transform = `translateX(${offsetX}px) translateY(${offsetY}px)`;
    }
  });
}

// ── 대수조 전용 세팅 ──
function isGrandTank(){ return currentTankIdx === 0; }

function grandWorldH(){
  return window.innerHeight * grandWorldMult;
}

// 대수조에서 물고기 yMin/yMax를 월드 전체로 넓혀 재배치
function applyGrandFishRange(){
  if(!isGrandTank()) return;
  const vh  = logicalH();
  const wh  = grandWorldMult * vh;  // 월드 높이 (논리 픽셀)
  FISH.forEach(f => {
    switch(f.fd.layer){
      case 'far':  f.yMin = wh*.03; f.yMax = wh*.55; break;
      case 'bot':  f.yMin = wh*.78; f.yMax = wh*.94; break;
      case 'near': f.yMin = wh*.05; f.yMax = wh*.90; break;
      default:     f.yMin = wh*.10; f.yMax = wh*.80; break;
    }
    // 현재 y가 새 범위 안에 들어오도록
    f.y = f.yMin + Math.random() * (f.yMax - f.yMin);
  });
}

// 수조 전환 시 호출
function onTankChanged(tankId){
  const wrap = document.getElementById('wrap');
  const scrollbar = document.getElementById('grand-scrollbar');
  const plxSlider = document.getElementById('grand-plx-slider');

  if(tankId === 0){
    // 대수조: grand-mode + 세로 스크롤바 활성화
    wrap.classList.add('grand-mode');
    if(scrollbar) scrollbar.style.display = 'block';
    applyGrandFishRange();
    // volume/caustic: 대수조에서 height:auto (비율 유지, top으로 이동)
    ['layer-bg-volume','layer-bg-caustic'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.style.height = 'auto';
    });
    const initScrollH = (grandWorldMult * window.innerHeight) - window.innerHeight;
    cam.target  = initScrollH;
    cam.current = initScrollH;
    const handle = document.getElementById('grand-scroll-handle');
    if(handle) handle.style.top = '';
  } else {
    // 다른 수조: grand-mode 해제, 세로 스크롤바 숨김
    wrap.classList.remove('grand-mode');
    if(scrollbar) scrollbar.style.display = 'none';
    // base 높이 초기화
    const base = document.getElementById('layer-bg-base');
    if(base) base.style.height = '';
    // volume/caustic: 일반 수조에서 height:100% (화면 꽉 채움)
    ['layer-bg-volume','layer-bg-caustic'].forEach(id => {
      const el = document.getElementById(id);
      if(el){ el.style.height = '100%'; el.style.top = '0px'; }
    });
    // 모든 배경 레이어 transform 초기화
    PLX_BG_MAP.forEach(({ id, key }) => {
      const el = document.getElementById(id);
      if(!el) return;
      el.style.transform  = 'none';
      el.style.marginLeft = '';
      el.style.marginTop  = '';
      if(key === 'floor' || key === 'floorobj' || key === 'midobj'){
        el.style.top = 'auto'; el.style.bottom = '0px';
      }
    });
    // frame 초기화
    const frameEl2 = document.getElementById('layer-frame-img');
    if(frameEl2){ frameEl2.style.transform = 'none'; frameEl2.style.height = ''; }
    // caustic top 초기화
    const causticEl = document.getElementById('layer-bg-caustic');
    if(causticEl) causticEl.style.transform = 'none';
  }

  // 가로 슬라이더는 모든 수조에서 표시
  if(plxSlider) plxSlider.style.display = 'block';

  // 패럴랙스 X는 수조 전환 시 중앙으로 부드럽게 복귀
  plx.mouseX = 0;
  plx.curX   = 0;
  const plxHandle = document.getElementById('grand-plx-handle');
  if(plxHandle){ plxHandle.style.left = ''; plxHandle.style.marginLeft = '0'; }
}

// ══════════════════════════════════════════
//  메인 루프
// ══════════════════════════════════════════
// 논리 픽셀 헬퍼 (캔버스는 DPR 배이므로 나눔)
function logicalW(){ return farCvs.width  / DPR; }
function logicalH(){ return farCvs.height / DPR; }

let t=0;
function loop(){
  const vw = logicalW();
  const vh = logicalH();
  t+=0.016;

  // ── lerp: 마우스 X → 패럴랙스 ──
  const LERP = 0.05;
  plx.curX += (plx.mouseX - plx.curX) * LERP;
  plx.curY += (plx.mouseY - plx.curY) * LERP;

  // ── 대수조: 스크롤바 → 카메라 오프셋 (lerp로 부드럽게) ──
  const grand = isGrandTank();
  if(grand){
    cam.current += (cam.target - cam.current) * LERP;
  }

  // ── 배경 패럴랙스 업데이트 ──
  updateParallaxBg(grand);

  // ── frame: base와 동일하게 카메라 따라감, X만 패럴랙스 ──
  const frameEl = document.getElementById('layer-frame-img');
  if(frameEl && frameEl.style.display !== 'none'){
    const offsetX = -(plx.curX * PLX_BG_MAX_X) * PLX['frame'];
    const offsetY = grand ? -cam.current : 0;
    frameEl.style.transform = `translateX(${offsetX}px) translateY(${offsetY}px)`;
  }

  // ── 스크롤바/슬라이더 핸들 동기화 ──
  if(grand && window.updateScrollHandle) window.updateScrollHandle();
  if(window.updatePlxHandle) window.updatePlxHandle();  // 모든 수조에서

  farCtx.clearRect(0,0,vw,vh);
  midCtx.clearRect(0,0,vw,vh);
  fgCtx.clearRect(0,0,vw,vh);

  FISH.forEach(f=>{
    f.t+=0.016;
    f.x += f.dir*f.fd.speed*f.sm*60*0.016;
    f.y += Math.sin(f.t*.42+f.phase)*.55;
    if(f.y<f.yMin) f.y=f.yMin;
    if(f.y>f.yMax) f.y=f.yMax;
    if(f.x> vw+f.w*2){f.dir=-1; f.x=vw+f.w;}
    if(f.x<-f.w*3)  {f.dir=1;  f.x=-f.w*2;}

    if(!f.img.complete||!f.img.naturalWidth) return;

    const snake=Math.sin(f.t*2.8+f.phase)*.028;
    let tc;
    switch(f.fd.layer){
      case 'far':  tc=farCtx; break;
      case 'near': tc=fgCtx;  break;
      default:     tc=midCtx;
    }

    // ── 패럴랙스 X 오프셋 (물고기 레이어별) ──
    let plxXKey = 'fishMid';
    if(f.fd.layer==='far')  plxXKey = 'fishFar';
    if(f.fd.layer==='near') plxXKey = 'fishNear';
    const fishPlxX = -plx.curX * PLX_BG_MAX_X * PLX[plxXKey];

    // ── 대수조: 세로 카메라 오프셋 (물고기도 카메라와 함께 이동) ──
    // 레이어별 패럴랙스 배율로 살짝 차이
    let camOffsetY = 0;
    if(grand){
      const layerCamScl = (f.fd.layer==='far') ? 0.85
                        : (f.fd.layer==='near') ? 1.0
                        : 0.92;
      camOffsetY = cam.current * layerCamScl;
    }

    tc.save();
    tc.globalAlpha=f.da;
    tc.translate(f.x + fishPlxX, f.y - f.h/2 - camOffsetY);
    if(f.dir===1){tc.translate(f.w,0);tc.scale(-1,1);}
    tc.translate(f.w/2,f.h/2);
    tc.rotate(snake);
    tc.translate(-f.w/2,-f.h/2);
    tc.drawImage(f.img,0,0,f.w,f.h);
    tc.restore();
  });

  requestAnimationFrame(loop);
}
loop();

localStorage.setItem(GH_REPO_KEY, 'aquive');
function getGhUser(){ return 'norang1225'; }
function getGhRepo(){ return 'aquive'; }

let remoteData = null;

async function loadTanksJson(){
  const user = getGhUser();
  const repo = getGhRepo();
  if(!user || !repo) return null;
  try{
    const url = `https://raw.githubusercontent.com/${user}/${repo}/main/data/tanks.json?t=${Date.now()}`;
    const res = await fetch(url);
    if(!res.ok) return null;
    const json = await res.json();
    remoteData = json.tanks || {};
    return remoteData;
  } catch(e){ return null; }
}


function fixImageUrl(url){
  if(!url) return url;
  // jsdelivr → raw로 변환 (jsdelivr 캐시 문제)
  if(url.includes('cdn.jsdelivr.net')){
    return url
      .replace('https://cdn.jsdelivr.net/gh/', 'https://raw.githubusercontent.com/')
      .replace('@main/', '/main/');
  }
  return url;
}

function applyBgFromData(bg){
  console.log('[AQUIVE] applyBgFromData:', JSON.stringify(bg));
  const MAP = {
    'base':     {el:'layer-bg-base',    def:'default-bg'},
    'caustic':  {el:'layer-bg-caustic', def:'default-caustic'},
    'volume':   {el:'layer-bg-volume',  def:null},
    'midobj':   {el:'layer-mid-obj',    def:null},
    'floor':    {el:'layer-floor-base', def:null},
    'floorobj': {el:'layer-floor-obj',  def:null},
    'shimmer':  {el:'layer-shimmer-img',def:null},
    'frame':    {el:'layer-frame-img',  def:null},
  };
  Object.entries(MAP).forEach(([key, map])=>{
    const el = document.getElementById(map.el);
    if(!el) return;
    const src = fixImageUrl(bg ? bg[key] : null);
    if(src){
      el.src = src;
      el.style.display = 'block';
      if(map.def){ const d=document.getElementById(map.def); if(d) d.style.display='none'; }
      // base 이미지 로드 완료 시 대수조 월드 높이 자동 재계산
      if(key === 'base' && isGrandTank()){
        el.onload = () => recalcGrandWorld();
        if(el.complete && el.naturalWidth) recalcGrandWorld();
      }
    } else {
      el.src = '';
      el.style.display = 'none';
      if(map.def){ const d=document.getElementById(map.def); if(d) d.style.display='block'; }
    }
  });
}

function applyFishFromData(fishArr){
  console.log('[AQUIVE] applyFishFromData:', fishArr?.length, fishArr?.[0]?.src);
  FISH.length = 0;
  if(!fishArr || !fishArr.length) return;
  fishArr = fishArr.map(f => ({...f, src: fixImageUrl(f.src)}));
  fishArr.forEach(fd => { FISH.push(...buildInstance(fd)); });
  const layerOrder = {far:0, bot:1, mid:2, near:3};
  FISH.sort((a,b) => (layerOrder[a.fd.layer]||2)-(layerOrder[b.fd.layer]||2));
  const uiTr = document.getElementById('ui-tr');
  if(uiTr) uiTr.textContent = FISH.length + ' specimens';
}

async function applyTankData(tankId){
  const localKey = 'aquive_tank_data';
  let local = {};
  try{ local = JSON.parse(localStorage.getItem(localKey)||'{}'); } catch(e){}
  const localTank  = local[tankId];
  const remoteTank = remoteData ? remoteData[tankId] : null;
  const bg   = localTank?.bg   || remoteTank?.bg   || {};
  const fish = (localTank?.fish?.length) ? localTank.fish : (remoteTank?.fish || []);
  applyBgFromData(bg);
  applyFishFromData(fish);
  onTankChanged(tankId);
}

let mapCurrentFloor = '1F';
const svgNS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs){
  const el = document.createElementNS(svgNS, tag);
  Object.entries(attrs||{}).forEach(([k,v])=> el.setAttribute(k, v));
  return el;
}

function tankFloorOf(idx){
  if(idx===0) return null; // 대수조는 보이드로 별도 처리
  if(idx>=1 && idx<=4) return '1F';
  if(idx>=5 && idx<=11) return 'B1';
  return 'B2';
}

function buildVoidPath(floor){
  // 대수조 보이드: 1F·B1 양쪽에 그려서 건물을 관통하는 느낌을 줌
  const g = svgEl('g', {});
  const r = VOID_RECT;
  const rect = svgEl('rect', {
    x:r.x, y:r.y, width:r.w, height:r.h, rx:18,
    fill:'rgba(40,150,220,0.10)',
    stroke:'rgba(120,210,255,0.35)', 'stroke-width':1,
    'stroke-dasharray': floor==='B2' ? '0' : '0',
  });
  g.appendChild(rect);

  // 내부 표시: 위/아래로 뚫려있다는 느낌의 점선
  const innerDash = svgEl('line', {
    x1:r.x+r.w/2, y1:r.y+14, x2:r.x+r.w/2, y2:r.y+r.h-14,
    stroke:'rgba(150,220,255,0.18)', 'stroke-width':1, 'stroke-dasharray':'2 6'
  });
  g.appendChild(innerDash);

  const label = svgEl('text', {
    x:r.x+r.w/2, y:r.y+r.h/2-10, 'text-anchor':'middle',
    class:'room-label', fill:'rgba(190,230,255,0.55)', 'font-size':12,
    'letter-spacing':'0.12em'
  });
  label.textContent = '대수조';
  g.appendChild(label);
  const labelEn = svgEl('text', {
    x:r.x+r.w/2, y:r.y+r.h/2+8, 'text-anchor':'middle',
    class:'room-label', fill:'rgba(140,200,255,0.4)', 'font-size':9,
    'letter-spacing':'0.16em'
  });
  labelEn.textContent = 'GRAND OCEAN TANK';
  g.appendChild(labelEn);

  const sub = svgEl('text', {
    x:r.x+r.w/2, y:r.y+r.h/2+26, 'text-anchor':'middle',
    fill:'rgba(120,180,230,0.32)', 'font-size':8, 'letter-spacing':'0.1em'
  });
  sub.textContent = floor==='1F' ? '1F – B1F 관통' : 'B1F까지 이어짐';
  g.appendChild(sub);

  g.classList.add('map-room');
  g.style.cursor = 'pointer';
  g.addEventListener('click', ()=> selectTankFromMap(0));
  g.addEventListener('mouseenter', (e)=> showMapTooltip(e, getTank(0), true, 0));
  g.addEventListener('mousemove', (e)=> moveMapTooltip(e));
  g.addEventListener('mouseleave', hideMapTooltip);

  if(currentTankIdx===0) g.classList.add('current');
  return g;
}

function buildStairIcon(x,y,toFloorLabel,small){
  const g = svgEl('g', {});
  const w = small?34:46, h = small?34:46;
  const rect = svgEl('rect', {x, y, width:w, height:h, rx:8, fill:'rgba(255,255,255,0.03)', stroke:'rgba(150,210,255,0.25)', 'stroke-width':0.8});
  g.appendChild(rect);
  const steps = svgEl('path', {
    d: small
      ? `M${x+9} ${y+21} h4 v-4 h4 v-4 h4 v-4 h4`
      : `M${x+12} ${y+30} h6 v-6 h6 v-6 h6 v-6 h6`,
    fill:'none', stroke:'rgba(190,230,255,0.55)', 'stroke-width':1.6, 'stroke-linecap':'round', 'stroke-linejoin':'round'
  });
  g.appendChild(steps);
  const txt = svgEl('text', {x:x+w/2, y:y+h+13, 'text-anchor':'middle', fill:'rgba(150,210,255,0.4)', 'font-size':8.5, 'letter-spacing':'0.08em'});
  txt.textContent = toFloorLabel;
  g.appendChild(txt);
  return g;
}

function renderMapFloor(floor){
  mapCurrentFloor = floor;
  const svg = document.getElementById('map-svg');
  svg.innerHTML = '';

  document.querySelectorAll('.floor-tab').forEach(tab=>{
    tab.classList.toggle('active', tab.dataset.floor===floor);
  });

  const defs = svgEl('defs', {});
  svg.appendChild(defs);

  // 대수조 보이드는 1F, B1에서 표시
  if(floor==='1F' || floor==='B1'){
    svg.appendChild(buildVoidPath(floor));
  }

  const rooms = MAP_ROOMS[floor] || [];
  rooms.forEach(r=>{
    const tank = getTank(r.id);
    if(!tank) return;
    const unlocked = isTankUnlocked(tank);
    const isCurrent = (currentTankIdx === r.id);

    const g = svgEl('g', {class:'map-room'+(unlocked?'':' locked')+(isCurrent?' current':'')});

    const fillUnlocked = isCurrent ? 'rgba(255,205,110,0.16)' : 'rgba(70,170,235,0.14)';
    const strokeUnlocked = isCurrent ? 'rgba(255,210,120,0.85)' : 'rgba(120,200,255,0.4)';
    const fillLocked = 'rgba(140,150,165,0.06)';
    const strokeLocked = 'rgba(140,150,165,0.18)';

    const rect = svgEl('rect', {
      x:r.x, y:r.y, width:r.w, height:r.h, rx:14,
      class:'room-fill',
      fill: unlocked ? fillUnlocked : fillLocked,
      stroke: unlocked ? strokeUnlocked : strokeLocked,
      'stroke-width': isCurrent ? 1.6 : 1,
    });
    g.appendChild(rect);

    if(isCurrent){
      const pulse = svgEl('rect', {
        x:r.x, y:r.y, width:r.w, height:r.h, rx:14,
        class:'room-pulse', fill:'none', stroke:'rgba(255,215,130,0.9)', 'stroke-width':2,
      });
      g.appendChild(pulse);
    }

    const nameY = r.h > 90 ? r.y + r.h/2 - 8 : r.y + r.h/2 - 6;
    const name = svgEl('text', {
      x:r.x+r.w/2, y:nameY, 'text-anchor':'middle', class:'room-label',
      fill: unlocked ? 'rgba(225,245,255,0.9)' : 'rgba(170,180,195,0.45)',
      'font-size':14, 'font-weight':600, 'letter-spacing':'0.04em'
    });
    name.textContent = tank.name;
    g.appendChild(name);

    const enY = nameY + 17;
    const en = svgEl('text', {
      x:r.x+r.w/2, y:enY, 'text-anchor':'middle', class:'room-label',
      fill: unlocked ? 'rgba(150,205,255,0.55)' : 'rgba(150,160,175,0.35)',
      'font-size':9, 'letter-spacing':'0.14em'
    });
    en.textContent = tank.nameEn;
    g.appendChild(en);

    if(!unlocked){
      const lockY = enY + 18;
      const lockTxt = svgEl('text', {
        x:r.x+r.w/2, y:lockY, 'text-anchor':'middle',
        fill:'rgba(160,170,185,0.4)', 'font-size':9, 'letter-spacing':'0.06em'
      });
      lockTxt.textContent = '🔒 −'+Math.abs(tank.unlock)+'m';
      g.appendChild(lockTxt);
    }

    g.addEventListener('click', ()=> selectTankFromMap(r.id));
    g.addEventListener('mouseenter', (e)=> showMapTooltip(e, tank, unlocked, r.id));
    g.addEventListener('mousemove', (e)=> moveMapTooltip(e));
    g.addEventListener('mouseleave', hideMapTooltip);

    svg.appendChild(g);
  });

  // 계단/이동 안내 아이콘 — 룸과 겹치지 않는 여백에 배치
  if(floor==='1F'){
    svg.appendChild(buildStairIcon(660, 420, 'B1F ↓'));
  } else if(floor==='B1'){
    svg.appendChild(buildStairIcon(660, 500, '1F ↑'));
    svg.appendChild(buildStairIcon(135, 578, 'B2F ↓', true));
  } else if(floor==='B2'){
    svg.appendChild(buildStairIcon(420, 410, 'B1F ↑'));
  }
}

function showMapTooltip(evt, tank, unlocked, tankId){
  const tooltip = document.getElementById('map-tooltip');
  const stage = document.getElementById('map-stage');
  document.getElementById('tt-name').textContent = tank.name;
  document.getElementById('tt-en').textContent = tank.nameEn;
  const lockEl = document.getElementById('tt-lock');
  if(!unlocked){
    const needed = Math.abs(tank.unlock);
    const current = getDepth();
    lockEl.textContent = '수심 '+tank.unlock+'m 도달 시 해금 · 현재 −'+current+'m';
    lockEl.style.display = 'block';
  } else {
    lockEl.style.display = 'none';
  }
  tooltip.classList.add('show');
  moveMapTooltip(evt);
}

function moveMapTooltip(evt){
  const tooltip = document.getElementById('map-tooltip');
  const stage = document.getElementById('map-stage');
  const rect = stage.getBoundingClientRect();
  let x = evt.clientX - rect.left;
  let y = evt.clientY - rect.top - 14;
  tooltip.style.left = x+'px';
  tooltip.style.top = y+'px';
}

function hideMapTooltip(){
  document.getElementById('map-tooltip').classList.remove('show');
}

const DEX_KEY = 'aquive_collected_fish';

function getCollectedSet(){
  try{
    const arr = JSON.parse(localStorage.getItem(DEX_KEY) || '[]');
    return new Set(arr);
  } catch(e){ return new Set(); }
}
function saveCollectedSet(set){
  try{ localStorage.setItem(DEX_KEY, JSON.stringify(Array.from(set))); } catch(e){}
}

function recordSighting(fishId){
  if(fishId===undefined || fishId===null) return;
  const set = getCollectedSet();
  const had = set.has(fishId);
  set.add(fishId);
  saveCollectedSet(set);
  if(!had){
    updateDexBadge();
    if(document.getElementById('dex-overlay')?.classList.contains('open')){
      renderDex();
    }
  }
}

// 전체 수조의 물고기 데이터를 한 번에 모음 (remoteData + localStorage 병합, applyTankData와 동일한 우선순위)
function getAllFishAcrossTanks(){
  const localKey = 'aquive_tank_data';
  let local = {};
  try{ local = JSON.parse(localStorage.getItem(localKey)||'{}'); } catch(e){}

  const groups = [];
  TANKS.forEach(tank=>{
    const localTank  = local[tank.id];
    const remoteTank  = remoteData ? remoteData[tank.id] : null;
    const fishArr = (localTank?.fish?.length) ? localTank.fish : (remoteTank?.fish || []);
    groups.push({
      tank,
      fish: fishArr.map(f => ({...f, src: fixImageUrl(f.src)})),
    });
  });
  return groups;
}

function updateDexBadge(){
  const badge = document.getElementById('dex-badge');
  if(!badge) return;
  const groups = getAllFishAcrossTanks();
  const totalFish = groups.reduce((sum,g)=> sum + g.fish.length, 0);
  const collected = getCollectedSet();
  const foundCount = groups.reduce((sum,g)=> sum + g.fish.filter(f=>collected.has(f.id)).length, 0);
  if(totalFish === 0){
    badge.style.display = 'none';
    return;
  }
  badge.style.display = 'flex';
  badge.textContent = foundCount;
}

function maskName(name){
  // 미발견 종의 이름을 자모 단위로 가려서 '???' 식으로 표시
  return name.replace(/./g, '?');
}

function renderDex(){
  const content = document.getElementById('dex-content');
  const groups = getAllFishAcrossTanks();
  const collected = getCollectedSet();

  let totalFish = 0, totalFound = 0;
  content.innerHTML = '';

  groups.forEach(group=>{
    if(!group.fish.length) return;
    totalFish += group.fish.length;

    const section = document.createElement('div');
    section.className = 'dex-section';

    const foundInSection = group.fish.filter(f=>collected.has(f.id)).length;
    totalFound += foundInSection;

    const head = document.createElement('div');
    head.className = 'dex-section-head';
    head.innerHTML = `
      <span class="dex-section-name">${group.tank.name}</span>
      <span class="dex-section-en">${group.tank.nameEn}</span>
      <span class="dex-section-count">${foundInSection} / ${group.fish.length}</span>
    `;
    section.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'dex-grid';

    group.fish.forEach(fd=>{
      const found = collected.has(fd.id);
      const card = document.createElement('div');
      card.className = 'dex-card '+(found?'found':'unfound');

      const thumbWrap = document.createElement('div');
      thumbWrap.className = 'dex-thumb-wrap';
      const img = document.createElement('img');
      img.className = 'dex-thumb';
      img.src = fd.src;
      img.alt = found ? fd.name : '미확인 개체';
      img.loading = 'lazy';
      thumbWrap.appendChild(img);
      card.appendChild(thumbWrap);

      const nameEl = document.createElement('div');
      nameEl.className = 'dex-card-name'+(found?'':' masked');
      nameEl.textContent = found ? fd.name : maskName(fd.name);
      card.appendChild(nameEl);

      if(found){
        card.addEventListener('click', ()=> showDexDetail(fd, group.tank));
      }

      grid.appendChild(card);
    });

    section.appendChild(grid);
    content.appendChild(section);
  });

  if(totalFish === 0){
    content.innerHTML = '<div id="dex-empty">아직 등록된 생물이 없습니다<br><span style="opacity:.6">수조를 둘러보며 새로운 개체를 만나보세요</span></div>';
  }

  const pct = totalFish ? Math.round((totalFound/totalFish)*100) : 0;
  document.getElementById('dex-progress-bar').style.width = pct+'%';
  document.getElementById('dex-progress-label').textContent = totalFound+' / '+totalFish;
}

function showDexDetail(fd, tank){
  document.getElementById('p-name').textContent = fd.name;
  document.getElementById('p-lat').textContent  = fd.latin;
  document.getElementById('p-desc').textContent = fd.desc;
  document.getElementById('p-dep').textContent  = fd.dep;
  popup.style.left = (window.innerWidth/2 - 126)+'px';
  popup.style.top  = (window.innerHeight/2 - 86)+'px';
  popup.classList.add('on');
  clearTimeout(popT);
  popT = setTimeout(()=>popup.classList.remove('on'), 4500);
}

function openDex(){
  renderDex();
  document.getElementById('dex-overlay').classList.add('open');
}
function closeDex(){
  document.getElementById('dex-overlay').classList.remove('open');
}

document.getElementById('dex-toggle')?.addEventListener('click', openDex);
document.getElementById('dex-close')?.addEventListener('click', closeDex);

if(_plxSliderInit) _plxSliderInit.style.display = 'block';

function getDepth(){
  try{ return JSON.parse(localStorage.getItem('aquive_depth')||'{"depth":0}').depth; }
  catch(e){ return 0; }
}

function isTankUnlocked(tank){
  const depth = getDepth();
  if(tank.autoUnlock) return depth >= 4000;
  return depth >= Math.abs(tank.unlock);
}

function buildNavDots(){
  const wrap = document.getElementById('tank-nav-dots');
  if(!wrap) return;
  wrap.innerHTML = '';
  TANKS.forEach((tank,i)=>{
    const dot = document.createElement('div');
    dot.className = 'nav-dot'+(i===currentTankIdx?' active':'')+(!isTankUnlocked(tank)?' locked':'');
    dot.title = tank.name;
    dot.addEventListener('click', ()=> tryNav(i));
    wrap.appendChild(dot);
  });
}

function updateNavUI(){
  const tank = TANKS[currentTankIdx];
  const nameEl = document.getElementById('tank-nav-name');
  if(nameEl) nameEl.textContent = tank.name+' · '+tank.nameEn;
  const tankNameEl = document.getElementById('ui-tank-name');
  if(tankNameEl) tankNameEl.textContent = tank.name+' · '+tank.nameEn;
  const prevBtn = document.getElementById('nav-prev');
  const nextBtn = document.getElementById('nav-next');
  if(prevBtn) prevBtn.disabled = currentTankIdx===0;
  if(nextBtn) nextBtn.disabled = currentTankIdx===TANKS.length-1;
  buildNavDots();
  if(document.getElementById('map-overlay')?.classList.contains('open')){
    renderMapFloor(mapCurrentFloor);
  }
}

function showLockToast(tank){
  const toast = document.getElementById('lock-toast');
  const msg   = document.getElementById('lock-msg');
  if(!toast||!msg) return;
  const needed  = Math.abs(tank.unlock);
  const current = getDepth();
  const diff    = needed-current;
  msg.innerHTML = tank.name+'<br>수심 '+tank.unlock+'m 도달 시 해금<br><span style="color:rgba(120,190,255,0.5);font-size:10px">현재 -'+current+'m · '+diff+'m 더 필요</span>';
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> toast.classList.remove('show'), 2800);
}

function tryNav(idx){
  const tank = TANKS[idx];
  if(!isTankUnlocked(tank)){ showLockToast(tank); return; }
  switchTankWithData(idx);
}

async function switchTankWithData(idx){
  if(idx === currentTankIdx) return;
  const overlay = document.getElementById('tank-overlay');
  if(overlay) overlay.classList.add('fade-in');
  setTimeout(async ()=>{
    currentTankIdx = idx;
    updateNavUI();
    await applyTankData(idx);
    if(overlay) overlay.classList.remove('fade-in');
  }, 350);
}

// 화살표 이벤트
document.getElementById('nav-prev')?.addEventListener('click', ()=>{
  if(currentTankIdx > 0) tryNav(currentTankIdx-1);
});
document.getElementById('nav-next')?.addEventListener('click', ()=>{
  if(currentTankIdx < TANKS.length-1) tryNav(currentTankIdx+1);
});

// 초기 로드
(async function(){
  await loadTanksJson();
  await applyTankData(0);
  updateDexBadge();
})();

</script>
